      <div class="element3D">

    <script type="module">
      import {
        initialiseCarousel,
        onKeepRotating,
        setConfig,
      } from "../src/index.js";
      // mount it, poke at it, etc.

      document
        .getElementById("carousel3D")
        .addEventListener("carousel3d:loaded", (e) => {
          console.log("all images loaded for", e.detail.id);
          const config = {
            circleRatio: 0.45,
            speed: 15,
            rotateFreeSpeed: 100,
            minimizeRatio: 0.8,
            darknessRatio: 0.45,
            waitTouchTimer: 5000,
          };
          setConfig(config);
          onKeepRotating("left");
        });

      initialiseCarousel("carousel3D");

      document
        .getElementById(carouselId)
        .addEventListener("carousel3d:touched", (e) => {
          console.log(`Touch event end ${carouselId}`);
        });

      document
        .getElementById(carouselId)
        .addEventListener("carousel3d:touched", (e) => {
          console.log(`All images loaded for ${carouselId}`);
          slowSpin(carouselId);
        });

      function slowSpin(Id) {
        const config = {
          circleRatio: 0.45,
          speed: 15,
          rotateFreeSpeed: 100,
          minimizeRatio: 0.8,
          darknessRatio: 0.45,
          waitTouchTimer: 5000,
        };
        setConfig(config);
        onKeepRotating("left");
      }
    </script>
  </body>
</html>
