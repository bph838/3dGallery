    <script type="module">
      import {
        initialiseCarousel,
        onKeepRotating,
        setConfig,
      } from "../src/index.js";
      // mount it, poke at it, etc.

      document
        .getElementById("carousel3D")
        .addEventListener("carousel3d:loaded", (e) => {
          console.log("all images loaded for", e.detail.id);
          const config = {
            circleRatio: 0.45,
            speed: 2,
            rotateFreeSpeed: 100,
            minimizeRatio: 0.8,
            opacityRatio: 0.45,
          };
          setConfig(config);
          onKeepRotating("left");
        });

      initialiseCarousel("carousel3D");

      document
        .getElementById(carouselId)
        .addEventListener("carousel3d:touched", (e) => {
          console.log(`Touch event end ${carouselId}`);
        });
    </script>
